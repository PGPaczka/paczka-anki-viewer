<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paczka Anki Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="spinner"></div>
      <p>Ładowanie talii Anki...</p>
    </div>
    <div id="error" class="hidden"></div>
    <div id="recent-decks" class="hidden">
      <h2>📚 Ostatnie talie</h2>
      <p class="recent-subtitle">Ostatnio otwierane pliki .apkg</p>
      <div id="recent-list"></div>
      <p class="recent-empty hidden" id="recent-empty">Brak historii. Otwórz plik .apkg aby go tutaj zobaczyć.</p>
      <hr class="menu-divider" />
      <h3 class="local-section-title">✏️ Moje talie</h3>
      <div id="local-deck-list"></div>
      <button id="create-deck-btn" class="fc-btn create-deck-btn">➕ Stwórz nową talię</button>
      <button id="import-deck-btn" class="fc-btn import-deck-btn">📥 Importuj talię (.apkg)</button>
      <input type="file" id="import-deck-input" accept=".apkg" class="hidden" />
    </div>
    <!-- Deck editor -->
    <div id="deck-editor" class="hidden">
      <div class="editor-header">
        <button id="editor-back" class="fc-btn-small">← Powrót</button>
        <input type="text" id="editor-deck-name" placeholder="Nazwa talii..." class="editor-name-input" />
        <button id="editor-save" class="fc-btn fc-btn-green">💾 Zapisz</button>
        <button id="editor-export" class="fc-btn">📤 Eksportuj .apkg</button>
      </div>
      <div class="editor-controls">
        <div class="editor-add-group">
          <button id="editor-add-basic" class="fc-btn">➕ Podstawowa</button>
          <button id="editor-add-cloze" class="fc-btn">➕ Luka</button>
          <button id="editor-add-quiz" class="fc-btn">➕ Quiz</button>
        </div>
        <span id="editor-card-count" class="editor-count"></span>
      </div>
      <div id="editor-cards"></div>
    </div>
    <div id="content" class="hidden">
      <header id="header">
        <a id="back-to-menu" class="fc-btn-small hidden" href="#">← Menu</a>
        <h1 id="deck-name">Anki Deck</h1>
        <span id="card-count"></span>
        <span id="fc-stats" class="hidden">
          <span id="fc-remaining">📋 <strong>0</strong></span>
          <span id="fc-learned">✅ <strong>0</strong></span>
          <span id="fc-not-learned">❌ <strong>0</strong></span>
        </span>
        <div id="fc-header-controls" class="hidden">
          <button id="fc-undo" class="fc-btn-small" disabled>↩️</button>
          <button id="fc-shuffle" class="fc-btn-small">🔀</button>
          <button id="fc-reset" class="fc-btn-small">🔄</button>
        </div>
        <div id="mode-switch">
          <button id="btn-list" class="mode-btn active">Lista</button>
          <button id="btn-flashcard" class="mode-btn">Fiszki</button>
        </div>
      </header>
      <!-- List mode -->
      <div id="list-mode">
        <div id="controls">
          <input type="text" id="search" placeholder="Szukaj w kartach..." />
        </div>
        <div id="cards"></div>
      </div>
      <!-- Flashcard mode -->
      <div id="flashcard-mode" class="hidden">
        <div id="flashcard-container">
          <div id="swipe-indicator-left" class="swipe-indicator left">❌</div>
          <div id="swipe-indicator-right" class="swipe-indicator right">✅</div>
          <div id="flashcard" class="flashcard">
            <div class="flashcard-inner" id="flashcard-inner">
              <div class="flashcard-face flashcard-front">
                <div class="flashcard-label">Przód</div>
                <div class="flashcard-content" id="fc-front"></div>
                <div class="flashcard-bottom">
                  <span class="flashcard-hint">Kliknij aby odkryć</span>
                  <span id="fc-counter">1 / 1</span>
                </div>
              </div>
              <div class="flashcard-face flashcard-back">
                <div class="flashcard-label">Tył</div>
                <div class="flashcard-content" id="fc-back"></div>
                <div class="flashcard-actions">
                  <button id="fc-not-known" class="fc-btn fc-btn-red">❌ Nie umiem</button>
                  <button id="fc-known" class="fc-btn fc-btn-green">✅ Umiem</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div id="fc-done" class="hidden">
          <h2>🎉 Koniec talii!</h2>
          <p id="fc-done-stats"></p>
          <button id="fc-retry-wrong" class="fc-btn">🔁 Powtórz nie nauczone</button>
          <button id="fc-restart" class="fc-btn">🔄 Od nowa</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
